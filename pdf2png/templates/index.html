<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PNG Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect x="4" y="4" width="32" height="32" rx="8" stroke="url(#grad1)" stroke-width="2"/>
                    <path d="M12 20L18 26L28 14" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00f5d4"/>
                            <stop offset="100%" style="stop-color:#7b2cbf"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="title">PDF to PNG</h1>
            <p class="subtitle">Transform your documents into stunning images</p>
        </header>

        <main class="main-content">
            <div class="upload-zone" id="dropZone">
                <div class="upload-content">
                    <div class="upload-icon">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <path d="M32 8V40M32 8L20 20M32 8L44 20" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 44V52C8 54.2091 9.79086 56 12 56H52C54.2091 56 56 54.2091 56 52V44" stroke="url(#uploadGrad)" stroke-width="3" stroke-linecap="round"/>
                            <defs>
                                <linearGradient id="uploadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#00f5d4"/>
                                    <stop offset="100%" style="stop-color:#7b2cbf"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <p class="upload-text">Drop your files here</p>
                    <p class="upload-hint">PDF, ZIP, RAR, TAR.GZ or Folder</p>
                    <div class="upload-buttons">
                        <button class="upload-btn" id="selectFilesBtn">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M8 1V15M1 8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            Select Files
                        </button>
                        <button class="upload-btn" id="selectFolderBtn">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M1 4V12C1 13.1046 1.89543 14 3 14H13C14.1046 14 15 13.1046 15 12V6C15 4.89543 14.1046 4 13.5 4H8L6 2H3C1.89543 2 1 2.89543 1 4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Select Folder
                        </button>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf,.zip,.rar,.7z,.tar,.gz,.tgz" multiple hidden>
                    <input type="file" id="folderInput" webkitdirectory directory multiple hidden>
                </div>
                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div class="file-list-panel" id="fileListPanel" style="display: none;">
                <div class="file-list-header">
                    <h3 class="file-list-title">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M3 4H17M3 4V16C3 17.1046 3.89543 18 5 18H15C16.1046 18 17 17.1046 17 16V4M3 4L5 2H15L17 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Selected Files <span id="fileCount">0</span>
                    </h3>
                    <button class="btn-clear" id="clearFilesBtn">Clear All</button>
                </div>
                <div class="file-list" id="fileList"></div>
                <div class="file-list-footer">
                    <button class="btn-convert" id="convertBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2V18M2 10H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Convert All
                    </button>
                </div>
            </div>

            <div class="options-panel" id="optionsPanel">
                <div class="option-group">
                    <label for="dpi">Quality (DPI)</label>
                    <div class="select-wrapper">
                        <select id="dpi">
                            <option value="150">150 - Fast</option>
                            <option value="300">300 - Standard</option>
                            <option value="600" selected>600 - High Quality</option>
                            <option value="1200">1200 - Ultra HD</option>
                        </select>
                    </div>
                </div>
                <div class="option-group">
                    <label for="crop">Crop White Borders</label>
                    <label class="toggle">
                        <input type="checkbox" id="crop" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="results-panel" id="resultsPanel" style="display: none;">
                <div class="results-header">
                    <h2 class="results-title">Converted Files</h2>
                    <button class="btn-download-all" id="downloadAllBtn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2V14M10 14L5 9M10 14L15 9M3 18H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Download All
                    </button>
                </div>
                <div class="results-stats" id="resultsStats"></div>
                <div class="results-grid" id="resultsGrid"></div>
            </div>
        </main>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <p class="loading-text">Converting...</p>
            <p class="loading-sub" id="loadingSub"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
